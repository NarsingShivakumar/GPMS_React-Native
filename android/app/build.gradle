apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

android {
    namespace "com.leadwinner.gpms_standard"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.leadwinner.gpms_standard"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug { signingConfig signingConfigs.debug }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildFeatures {
        buildConfig true
    }

    // ─────────────────────────────────────────────────────────────────────────
    // ROOT CAUSE FIX:
    // AGP 8.x defaults to jniLibs.useLegacyPackaging = false, which stores
    // .so files COMPRESSED inside the APK. dlopen() cannot load a compressed
    // .so when android:extractNativeLibs="false" (default for API 23+).
    // Setting useLegacyPackaging = true stores .so files UNCOMPRESSED so
    // dlopen() can load libreact_featureflagsjni.so (and all other RN .so files)
    // directly from the APK without needing extraction.
    // ─────────────────────────────────────────────────────────────────────────
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"

    // WebSocket server for screen streaming
    implementation "org.java-websocket:Java-WebSocket:1.5.4"

    implementation "androidx.core:core-ktx:1.12.0"
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.lifecycle:lifecycle-service:2.7.0"
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.7.0"
}

react {
    autolinkLibrariesWithApp()
}